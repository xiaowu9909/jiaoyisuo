# 生产环境：通过环境变量或外部配置覆盖
# 环境要求：MySQL 8.0（必须 8.0！）、Redis、JDK 17
# 启动方式：java -jar xxx.jar --spring.profiles.active=prod
# 或设置 SPRING_PROFILES_ACTIVE=prod
# 上线前请完成 scripts/CHECKLIST.md 中的必检项

server:
  port: ${SERVER_PORT:8080}
  # 若前置 Nginx/负载均衡已终止 TLS，可不在应用层配置 SSL；否则可启用：
  # ssl:
  #   enabled: true
  #   key-store: classpath:keystore.p12
  #   key-store-password: ${SSL_KEYSTORE_PASSWORD}
  #   key-store-type: PKCS12

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/sql_vault314_com?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: sql_vault314_com
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 生产环境连接池调优（>100 并发时可适当增大）
    hikari:
      maximum-pool-size: ${HIKARI_MAXIMUM_POOL_SIZE:50}
      minimum-idle: ${HIKARI_MINIMUM_IDLE:10}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  data:
    redis:
      host: ${SPRING_REDIS_HOST:127.0.0.1}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

# 生产环境 CORS：在此添加前台/管理后台域名，逗号分隔
app:
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:https://vault314.com,https://admin.vault314.com}

# 生产：自动创建默认管理员 admin/admin123，登录后请立即在后台修改密码
vaultpi:
  bootstrap:
    create-default-admin: false
  security:
    expose-error-message: false
    csrf-enabled: true
    hsts-enabled: true
  # WebSocket：生产必须限制为前端域名列表，禁止 *
  websocket:
    allowed-origin-patterns: ${APP_CORS_ORIGINS:https://vault314.com,https://admin.vault314.com}
  # 虚拟盘引擎：生产环境显式覆盖，避免继承默认值
  virtual:
    kline-history-bars: 500
    default-price-low: 60
    default-price-high: 120
    entropy-noise-enabled: true
    dynamic-volatility-enabled: true
    ou-mode-enabled: true
  # 是否允许同一用户买卖单自成交；false=禁止
  exchange:
    allow-self-trade: false

# 生产环境日志级别，避免 DEBUG 泄露与性能损耗
logging:
  level:
    com.vaultpi: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
