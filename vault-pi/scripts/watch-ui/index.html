<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault π — 实时改动</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: #0f0f12;
      color: #e4e4e7;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 8px 0;
      color: #fafafa;
    }
    .sub {
      color: #71717a;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }
    .list {
      background: #18181b;
      border-radius: 12px;
      border: 1px solid #27272a;
      overflow: hidden;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid #27272a;
      font-size: 0.9rem;
    }
    .row:last-child { border-bottom: none; }
    .row:hover { background: #1f1f23; }
    .time {
      flex-shrink: 0;
      width: 72px;
      color: #a1a1aa;
      font-variant-numeric: tabular-nums;
    }
    .path {
      flex: 1;
      font-family: ui-monospace, monospace;
      word-break: break-all;
      color: #d4d4d8;
    }
    .badge {
      flex-shrink: 0;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 6px;
      background: #3f3f46;
      color: #a1a1aa;
    }
    .empty {
      padding: 40px 20px;
      text-align: center;
      color: #71717a;
    }
    .live {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <h1><span class="live"></span>Vault π 实时改动</h1>
  <p class="sub">项目目录：vault-pi · 每 1.5 秒刷新</p>
  <div class="list" id="list">
    <div class="empty">暂无改动记录，保存文件后会在这里显示</div>
  </div>

  <script>
    const listEl = document.getElementById('list');
    function render(changes) {
      if (!changes || changes.length === 0) {
        listEl.innerHTML = '<div class="empty">暂无改动记录，保存文件后会在这里显示</div>';
        return;
      }
      listEl.innerHTML = changes.map(c => `
        <div class="row">
          <span class="time">${c.time}</span>
          <span class="path">${escapeHtml(c.path)}</span>
          <span class="badge">${c.type}</span>
        </div>
      `).join('');
    }
    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
    function fetchChanges() {
      fetch('/api/changes')
        .then(r => r.json())
        .then(data => render(data.changes))
        .catch(() => {});
    }
    fetchChanges();
    setInterval(fetchChanges, 1500);
  </script>
</body>
</html>
