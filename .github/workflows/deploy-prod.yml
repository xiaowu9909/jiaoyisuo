name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy to Server
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            vault-pi/frontend/package-lock.json
            vault-pi/admin/package-lock.json

      - name: Build backend jar
        run: |
          cd vault-pi/backend
          mvn -B -DskipTests package

      - name: Build frontend
        run: |
          cd vault-pi/frontend
          npm ci
          npm run build

      - name: Build admin
        run: |
          cd vault-pi/admin
          npm ci
          npm run build

      - name: Package deploy bundle
        run: |
          rm -rf .deploy-temp
          mkdir -p .deploy-temp
          cp vault-pi/backend/target/vault-pi-backend-1.0.0-SNAPSHOT.jar .deploy-temp/
          cp -R vault-pi/frontend/dist .deploy-temp/public
          cp -R vault-pi/admin/dist .deploy-temp/admin
          tar -czf vaultpi-deploy.tgz -C .deploy-temp .

      - name: Upload deploy bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "vaultpi-deploy.tgz"
          target: "/root"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            APP_DIR="${{ secrets.DEPLOY_APP_DIR }}"
            TS="$(date +%Y%m%d-%H%M%S)"
            BK="${APP_DIR}/_backup/${TS}"
            mkdir -p "${BK}"

            cp -a "${APP_DIR}/public" "${BK}/public" || true
            cp -a "${APP_DIR}/admin" "${BK}/admin" || true
            cp -a "${APP_DIR}/vault-pi-backend-1.0.0-SNAPSHOT.jar" "${BK}/" || true

            mkdir -p /root/vaultpi-deploy
            rm -rf /root/vaultpi-deploy/*
            tar -xzf /root/vaultpi-deploy.tgz -C /root/vaultpi-deploy

            mkdir -p "${APP_DIR}/public" "${APP_DIR}/admin"
            cp -a /root/vaultpi-deploy/public/. "${APP_DIR}/public/"
            find "${APP_DIR}/admin" -mindepth 1 -maxdepth 1 ! -name .user.ini -exec rm -rf {} +
            cp -a /root/vaultpi-deploy/admin/. "${APP_DIR}/admin/"
            cp -f /root/vaultpi-deploy/vault-pi-backend-1.0.0-SNAPSHOT.jar "${APP_DIR}/"

            if [ -f "${APP_DIR}/config/env.prod" ]; then
              set -a
              . "${APP_DIR}/config/env.prod"
              set +a
            fi

            if [ -n "${SPRING_DATASOURCE_URL:-}" ] && [ -n "${SPRING_DATASOURCE_USERNAME:-}" ] && [ -n "${SPRING_DATASOURCE_PASSWORD:-}" ]; then
              DB_HOST="$(echo "${SPRING_DATASOURCE_URL}" | sed -E 's#^jdbc:mysql://([^:/?]+).*$#\1#')"
              DB_PORT="$(echo "${SPRING_DATASOURCE_URL}" | sed -E 's#^jdbc:mysql://[^:/?]+:([0-9]+).*$#\1#')"
              DB_NAME="$(echo "${SPRING_DATASOURCE_URL}" | sed -E 's#^.*/([^/?]+).*$#\1#')"
              mysql -h"${DB_HOST}" -P"${DB_PORT}" -u"${SPRING_DATASOURCE_USERNAME}" -p"${SPRING_DATASOURCE_PASSWORD}" -D "${DB_NAME}" \
                -e "UPDATE flyway_schema_v4_pro SET success=1 WHERE success=0;" >/dev/null 2>&1 || true
            fi

            # Use systemd if available, otherwise fall back to nohup
            if systemctl is-enabled vaultpi >/dev/null 2>&1; then
              systemctl stop vaultpi || true
              sleep 2
              systemctl start vaultpi
            else
              pkill -f 'vault-pi-backend-1.0.0-SNAPSHOT.jar' || true
              sleep 3
              for _i in $(seq 1 30); do
                if ! ss -ltnp 2>/dev/null | grep -q ':8081'; then break; fi
                sleep 1
              done
              cd "${APP_DIR}"
              nohup /usr/bin/java -Dspring.profiles.active=prod -Xms2g -Xmx2g \
                -jar vault-pi-backend-1.0.0-SNAPSHOT.jar \
                --server.port=8081 \
                --spring.jpa.hibernate.ddl-auto=none \
                --spring.flyway.table=flyway_schema_v4_pro \
                --spring.flyway.baseline-on-migrate=true \
                --spring.flyway.baseline-version=7 \
                --spring.flyway.out-of-order=true \
                --vaultpi.kraken.ws.reconnect-delay-ms=2000 \
                --spring.task.scheduling.pool.size=20 \
                > backend.log 2>&1 &
            fi

            # Wait up to 90s for backend health.
            OK=0
            for i in {1..30}; do
              if curl -fsS http://127.0.0.1:8081/actuator/health >/dev/null 2>&1; then
                OK=1
                break
              fi
              sleep 3
            done

            if [ "$OK" != "1" ]; then
              echo "Backend health check failed after 90s, printing backend.log tail:"
              tail -n 200 backend.log || true
              exit 1
            fi

            curl -fsS http://127.0.0.1:8081/actuator/health
            echo "Deploy success at ${TS}"
